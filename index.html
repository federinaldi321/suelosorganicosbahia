<!-- LIBRERÍA DE SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- TU CÓDIGO DE CONEXIÓN OPTIMIZADO -->
    <script>
        const SUPABASE_URL = "https://grjjghvqhbwezrqhsmbe.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdyampnaHZxaGJ3ZXpycWhzbWJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcwNzgsImV4cCI6MjA5OTUwMzA3OH0.6hlhnhoxcV6ra_TMvH3B7x9WGRb-lgQmXkCLP_T48T0";

        async function cargarProductos() {
            const contenedor = document.getElementById('contenedor-productos');
            
            if (!contenedor) return;

            if (typeof Supabase === 'undefined') {
                contenedor.innerHTML = `<p style="color: #b78a62;">❌ Error: La librería de Supabase no cargó correctamente.</p>`;
                return;
            }

            try {
                const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                const { data: productos, error } = await supabase
                    .from('productos')
                    .select('*');

                if (error) {
                    console.error("Error devuelto por Supabase:", error);
                    contenedor.innerHTML = `<p style="color: #b78a62;">⚠️ Supabase dice: ${error.message}</p>`;
                    return;
                }

                contenedor.innerHTML = ''; // Limpiamos el "Cargando..."

                if (!productos || productos.length === 0) {
                    contenedor.innerHTML = '<p>La tabla "productos" conectó bien, pero no tiene filas cargadas.</p>';
                    return;
                }

                // Dibujar las tarjetas dinámicas
                productos.forEach(prod => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'card product-card';
                    tarjeta.innerHTML = `
                        <div class="product-badge">$${prod.precio || 0}</div>
                        <h3>${prod.nombre || 'Producto sin nombre'}</h3>
                        <p>${prod.descripcion || 'Sin descripción'}</p>
                    `;
                    contenedor.appendChild(tarjeta);
                });

            } catch (err) {
                console.error("Error crítico:", err);
                contenedor.innerHTML = `<p style="color: #b78a62;">💥 Error de JS: ${err.message}</p>`;
            }
        }

        // Ejecutar inmediatamente sin esperar imágenes externas
        cargarProductos();
    </script>
</body>
</html>
